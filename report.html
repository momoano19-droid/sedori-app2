<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >
  <title>分析画面 | せどりGPS店舗管理PRO</title>

  <meta name="theme-color" content="#3976f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="せどりGPS店舗管理PRO">

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="container">
    <header class="appHeader card">
      <h1 class="appTitle">📊 分析画面</h1>
      <div class="appSub">
        月ごとの利益・成功率・カテゴリ・都道府県別の傾向を確認できます。
      </div>

      <div class="row2 mt12">
        <button class="ghostBtn" onclick="location.href='./index.html'">← 店舗管理に戻る</button>
        <button class="primaryBtn" onclick="goCurrentMonth()">今月へ戻る</button>
      </div>
    </header>

    <section class="card">
      <h2 class="sectionTitle">🗓 対象月</h2>

      <div class="filterGrid">
        <select id="monthPicker" onchange="changeReportMonth(this.value)"></select>
        <button class="ghostBtn" onclick="goCurrentMonth()">今月</button>
      </div>

      <div class="mini mt8">
        月を切り替えると、その月の利益・カテゴリ・都道府県別分析を確認できます。
      </div>
    </section>

    <section class="card" id="monthSummaryCard"></section>

    <section class="card">
      <h2 class="sectionTitle">📅 日別カレンダー</h2>
      <div id="calendarWrap"></div>
      <div id="selectedDayBar"></div>
    </section>

    <section id="topStoresWrap"></section>

    <section class="card">
      <h2 class="sectionTitle">📦 カテゴリ集計</h2>
      <div id="categoryWrap"></div>
    </section>

    <section class="card">
      <h2 class="sectionTitle">🗾 都道府県別分析</h2>
      <div id="prefAnalysisWrap"></div>
    </section>
  </div>

  <div
    id="detailModal"
    class="modal"
    onclick="closeDetailModal(event)"
    aria-hidden="true"
  >
    <div class="modalCard">
      <div class="row2" style="grid-template-columns:1fr auto; align-items:center;">
        <div id="detailTitle" class="sectionTitle" style="margin-bottom:0;">詳細</div>
        <button class="ghostBtn" onclick="hideDetailModal()">閉じる</button>
      </div>

      <div id="detailBody" class="mt12"></div>
    </div>
  </div>

  <script src="./js/report.js"></script>
</body>
</html>
