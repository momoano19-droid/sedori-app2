<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >
  <title>せどりGPS店舗管理PRO - レポート</title>

  <meta name="theme-color" content="#3976f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="せどりGPS店舗管理PRO">

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="container">
    <header class="appHeader card">
      <h1 class="appTitle">📊 レポート</h1>
      <div class="appSub">
        利益・訪問・成功・個数を、月別や期間別で振り返れます。
      </div>

      <div class="row2 mt12">
        <button class="ghostBtn" onclick="location.href='./index.html'">← アプリに戻る</button>
      </div>
    </header>

    <section class="card">
      <h2 class="sectionTitle">🗓 対象月 / 集計期間</h2>

      <div id="monthPickerWrap">
        <div class="row2" style="margin-bottom:12px;">
          <select id="monthPicker" onchange="changeReportMonth(this.value)"></select>
          <button class="ghostBtn" onclick="goCurrentMonth()">今月</button>
        </div>
      </div>

      <div id="selectedDayBar" class="selectedDayBar">
        <div class="dayStickyLabel">日付をタップするとここに表示されます</div>
        <div class="dayStickyValue">その日の合計利益 <strong>-</strong></div>
      </div>
    </section>

    <section class="card">
      <h2 class="sectionTitle">📅 カレンダー</h2>
      <div id="calendarWrap"></div>
    </section>

    <section class="card" id="monthSummaryCard"></section>

    <section id="topStoresWrap"></section>

    <section class="card">
      <h2 class="sectionTitle">📦 カテゴリ集計</h2>
      <div id="categoryWrap"></div>
    </section>

    <section class="card">
      <h2 class="sectionTitle">🗾 都道府県別分析</h2>
      <div id="prefAnalysisWrap"></div>
    </section>
  </div>

  <div
    id="detailModal"
    class="detailModal"
    aria-hidden="true"
    onclick="closeDetailModal(event)"
  >
    <div class="detailModalCard">
      <div class="detailModalHeader">
        <div id="detailTitle" class="detailModalTitle">詳細</div>
        <button type="button" class="ghostBtn" onclick="hideDetailModal()">閉じる</button>
      </div>
      <div id="detailBody" class="detailModalBody"></div>
    </div>
  </div>

  <script src="./js/report.js"></script>
</body>
</html>
