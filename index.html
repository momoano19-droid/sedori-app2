<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>店舗管理アプリ</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
    }

    .card {
      background: white;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h2>店舗登録</h2>

<input type="text" id="storeName" placeholder="店舗名">

<input type="text" id="locationUrl" placeholder="地図URL（Google / Apple）">

<button onclick="handleLocationUrlInput()">URLから座標取得</button>

<select id="quantity">
  <option value="">個数を選択</option>
  <option value="1">1個</option>
  <option value="2">2個</option>
  <option value="3">3個</option>
  <option value="4">4個</option>
  <option value="5">5個</option>
</select>

<input type="text" id="categoryInput" placeholder="カテゴリ入力">

<button onclick="saveCategory()">カテゴリ保存</button>

<select id="categorySelect" multiple></select>

<button onclick="saveStore()">登録</button>

<h2>登録一覧</h2>
<div id="list"></div>

<script>
let savedCategories = JSON.parse(localStorage.getItem("categories") || "[]");
let stores = JSON.parse(localStorage.getItem("stores") || "[]");

let currentLat = null;
let currentLng = null;

// =====================
// カテゴリ処理
// =====================
function saveCategory() {
  const input = document.getElementById("categoryInput");
  const value = input.value.trim();

  if (!value) return;

  if (!savedCategories.includes(value)) {
    savedCategories.push(value);
    localStorage.setItem("categories", JSON.stringify(savedCategories));
    renderCategories();
  }

  input.value = "";
}

function renderCategories() {
  const select = document.getElementById("categorySelect");
  select.innerHTML = "";

  savedCategories.forEach(cat => {
    const option = document.createElement("option");
    option.value = cat;
    option.textContent = cat;
    select.appendChild(option);
  });
}

// =====================
// URL → 座標取得
// =====================
function handleLocationUrlInput() {
  const value = document.getElementById("locationUrl").value;
  const result = extractLatLngFromUrl(value);

  if (result) {
    currentLat = result.lat;
    currentLng = result.lng;

    alert(`座標取得成功\n緯度: ${currentLat}\n経度: ${currentLng}`);
  } else {
    alert("座標を取得できませんでした。URLを確認してください。");
  }
}

function extractLatLngFromUrl(input) {
  if (!input) return null;

  const text = input.trim();

  // 生入力対応
  const direct = text.match(/(-?\d+\.\d+),\s*(-?\d+\.\d+)/);
  if (direct) {
    return { lat: parseFloat(direct[1]), lng: parseFloat(direct[2]) };
  }

  try {
    const url = new URL(text);

    // @形式
    const at = url.href.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
    if (at) {
      return { lat: parseFloat(at[1]), lng: parseFloat(at[2]) };
    }

    // q=
    const q = url.searchParams.get("q");
    if (q) {
      const m = q.match(/(-?\d+\.\d+),\s*(-?\d+\.\d+)/);
      if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
    }

    // ll=
    const ll = url.searchParams.get("ll");
    if (ll) {
      const m = ll.match(/(-?\d+\.\d+),\s*(-?\d+\.\d+)/);
      if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
    }

    // 最終 fallback
    const all = decodeURIComponent(url.href);
    const fallback = all.match(/(-?\d+\.\d+),\s*(-?\d+\.\d+)/);
    if (fallback) {
      return { lat: parseFloat(fallback[1]), lng: parseFloat(fallback[2]) };
    }

  } catch (e) {}

  return null;
}

// =====================
// 登録
// =====================
function saveStore() {
  const name = document.getElementById("storeName").value;
  const quantity = document.getElementById("quantity").value;

  const categorySelect = document.getElementById("categorySelect");
  const selectedCategories = Array.from(categorySelect.selectedOptions).map(o => o.value);

  if (!name || !quantity || selectedCategories.length === 0) {
    alert("未入力項目があります");
    return;
  }

  if (!currentLat || !currentLng) {
    alert("先にURLから座標を取得してください");
    return;
  }

  const store = {
    name,
    quantity,
    categories: selectedCategories,
    lat: currentLat,
    lng: currentLng
  };

  stores.push(store);
  localStorage.setItem("stores", JSON.stringify(stores));

  renderStores();
  resetForm();
}

// =====================
// 表示
// =====================
function renderStores() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  stores.forEach(s => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${s.name}</b><br>
      個数: ${s.quantity}<br>
      カテゴリ: ${s.categories.join(", ")}<br>
      座標: ${s.lat}, ${s.lng}
    `;

    list.appendChild(div);
  });
}

// =====================
// リセット
// =====================
function resetForm() {
  document.getElementById("storeName").value = "";
  document.getElementById("locationUrl").value = "";
  document.getElementById("quantity").value = "";
  document.getElementById("categoryInput").value = "";
  currentLat = null;
  currentLng = null;
}

// 初期化
renderCategories();
renderStores();
</script>

</body>
</html>
