<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店舗管理 | せどりGPS管理PRO</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#007aff">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <h1>📱 店舗管理</h1>
  <div class="sub">
    現場で使う画面です。店舗追加・一覧・近くの店舗・地図・今日ルートをここで操作します。
  </div>

  <div class="compactPanel">
    <div class="compactGrid">
      <button class="compactBtn primary" onclick="location.href='report.html'">📊 分析画面へ</button>
      <button class="compactBtn secondary" onclick="render()">再表示</button>
    </div>
  </div>

  <div class="compactPanel">
    <div class="compactTitle">バックアップ</div>
    <div class="compactGrid">
      <button class="compactBtn secondary" onclick="exportBackup()">📦 書き出し</button>
      <label class="compactBtn secondary" style="cursor:pointer;">
        📥 読込
        <input type="file" accept=".json,application/json" style="display:none" onchange="importBackup(event)">
      </label>
    </div>
    <div class="compactNote">店舗データ・ログデータをJSONで保存/復元</div>
  </div>

  <div class="compactPanel">
    <div class="compactTitle">自動バックアップ</div>
    <div class="compactGrid">
      <button class="compactBtn secondary" onclick="restoreAutoBackup()">♻ 復元</button>
      <button class="compactBtn secondary" onclick="showAutoBackupInfo()">🕒 確認</button>
    </div>
    <div class="compactNote">更新時に自動保存されます</div>
  </div>

  <div class="card">
    <div class="sectionTitle">店舗追加</div>

    <input id="storeName" placeholder="店舗名">
    <input id="prefName" placeholder="都道府県">
    <input id="address" placeholder="住所">
    <input id="mapUrl" placeholder="GoogleマップURL（任意）">

    <div class="row2">
      <button onclick="addStore()">追加</button>
      <button class="secondary" onclick="openMapSearchFromAddress()">地図検索</button>
    </div>
  </div>

  <div class="card">
    <input id="q" placeholder="検索（店舗名/都道府県/住所/カテゴリ）" oninput="render()">

    <select id="prefFilter" onchange="render()"></select>

    <input id="minExpected" placeholder="期待値 下限" oninput="render()">
    <input id="minRate" placeholder="成功率 下限%" oninput="render()">

    <select id="sortType" onchange="render()">
      <option value="expected">期待値順</option>
      <option value="rate">成功率順</option>
      <option value="avgProfit">平均利益順</option>
      <option value="visits">訪問回数順</option>
      <option value="route">ルート効率順</option>
    </select>
  </div>

  <div class="compactPanel">
    <div class="compactGrid">
      <button class="compactBtn primary" onclick="showNearbyStores()">📍 近くの店舗（3km）</button>
      <button class="compactBtn secondary" onclick="clearNearbyMode(); render()">通常表示</button>

      <button class="compactBtn secondary" onclick="toggleMapPanel()">🗺 店舗MAP</button>
      <button class="compactBtn secondary" onclick="moveMapToCurrentLocation()">📍 現在地へ移動</button>
    </div>
  </div>

  <div class="compactPanel">
    <div class="compactTitle">今日のルート</div>
    <div class="row2">
      <button class="compactBtn primary" onclick="buildTodayRoute(true)">🗓 今日ルート作成</button>
      <select id="todayPrefSelect"></select>
    </div>
    <div class="compactGrid" style="margin-top:8px;">
      <button class="compactBtn secondary" onclick="todayBulkOn()">この都道府県ON</button>
      <button class="compactBtn secondary" onclick="todayBulkOff()">この都道府県OFF</button>
    </div>
  </div>

  <div id="todayPlanArea"></div>

  <div id="mapWrap" class="mapWrap">
    <div id="map"></div>
    <div class="mapLegend">
      <div class="legendItem"><span class="legendDot red"></span>期待値 10000円以上</div>
      <div class="legendItem"><span class="legendDot orange"></span>期待値 3000〜9999円</div>
      <div class="legendItem"><span class="legendDot yellow"></span>期待値 1000〜2999円</div>
      <div class="legendItem"><span class="legendDot blue"></span>期待値 999円以下</div>
    </div>
  </div>

  <div id="storeList"></div>

  <!-- 個数入力モーダル -->
  <div id="qtyModal" class="qtyModal" aria-hidden="true">
    <div class="qtyModalCard">
      <div class="qtyModalTitle" id="qtyModalTitle">個数を選択</div>

      <div class="qtyQuickGrid">
        <button type="button" class="qtyQuickBtn" onclick="selectQtyQuick(1)">1</button>
        <button type="button" class="qtyQuickBtn" onclick="selectQtyQuick(2)">2</button>
        <button type="button" class="qtyQuickBtn" onclick="selectQtyQuick(3)">3</button>
        <button type="button" class="qtyQuickBtn" onclick="selectQtyQuick(4)">4</button>
        <button type="button" class="qtyQuickBtn" onclick="selectQtyQuick(5)">5</button>
        <button type="button" class="qtyQuickBtn qtyManualBtn" onclick="toggleQtyManual()">手入力</button>
      </div>

      <div id="qtyManualArea" class="qtyManualArea">
        <input id="qtyManualInput" type="number" inputmode="numeric" min="1" step="1" placeholder="6以上も入力できます">
        <button type="button" class="qtyConfirmBtn" onclick="confirmQtyManual()">この個数で決定</button>
      </div>

      <div class="qtyModalActions">
        <button type="button" class="qtyCancelBtn" onclick="closeQtyModal()">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- カテゴリ選択モーダル -->
  <div id="categoryModal" class="qtyModal" aria-hidden="true">
    <div class="qtyModalCard">
      <div class="qtyModalTitle" id="categoryModalTitle">カテゴリを選択</div>

      <div id="categoryList" class="categoryChoiceGrid"></div>

      <div class="qtyManualArea" id="categoryManualArea">
        <input id="categoryManualInput" type="text" placeholder="新しいカテゴリ名を入力">
        <button type="button" class="qtyConfirmBtn" onclick="confirmCategoryManual()">このカテゴリで決定</button>
      </div>

      <div class="qtyModalActions">
        <button type="button" class="qtyQuickBtn qtyManualBtn" onclick="toggleCategoryManual()">手入力</button>
        <button type="button" class="qtyCancelBtn" onclick="closeCategoryModal()">キャンセル</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js")
          .then(() => console.log("Service Worker registered"))
          .catch(err => console.error("Service Worker registration failed:", err));
      });
    }
  </script>
</body>
</html>
