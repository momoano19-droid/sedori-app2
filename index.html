<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店舗管理 | せどりGPS管理PRO</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#3976f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="店舗管理">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <link rel="stylesheet" href="./css/style.css?v=ui7">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
  <div class="page">

    <div class="topCard">
      <div class="topButtons">
        <button class="heroBtn" onclick="location.href='report.html'">📊 分析画面へ</button>
        <button class="ghostBtn" onclick="render()">再表示</button>
      </div>
    </div>

    <div class="card">
      <div class="topButtons">
        <button class="heroBtn" onclick="exportBackup()">📦 手動バックアップ</button>
        <button class="ghostBtn" onclick="restoreAutoBackup()">♻ 自動バックアップ</button>
      </div>

      <div class="row2 mt12">
        <button class="ghostBtn" onclick="document.getElementById('backupFile').click()">📥 バックアップ読込</button>
        <button class="ghostBtn" onclick="showAutoBackupInfo()">🕒 自動バックアップ確認</button>
      </div>

      <input
        id="backupFile"
        type="file"
        accept=".json,application/json"
        style="display:none"
        onchange="importBackup(event)"
      >

      <div class="helpText">
        手動バックアップはJSONを書き出します。自動バックアップは更新のたびに保存されます。
      </div>
    </div>

    <div class="card">
      <div class="addGrid">
        <input id="storeName" placeholder="店舗名を入力">
        <input id="prefName" placeholder="都道府県（例：茨城）">
        <input id="address" class="span2" placeholder="住所（これだけでもOK）">
        <input id="mapUrl" class="span2" placeholder="Googleマップ共有リンク / 短縮URL / place URL など">
      </div>

      <button class="primaryWide" onclick="addStore()">店舗追加</button>

      <div class="helpText">
        Googleマップの共有リンク、短縮URL、place URL、@緯度経度入りURLなどを読み取れるようにしています。
      </div>
    </div>

    <div class="card">
      <div class="searchGrid">
        <input id="q" placeholder="🔎 店舗検索（店舗名など）" oninput="render()">
        <select id="prefFilter" onchange="render()">
          <option value="__ALL__">全て（都道府県ごと）</option>
        </select>

        <input id="minExpected" placeholder="期待値 下限（例：2000）" oninput="render()">
        <input id="minRate" placeholder="成功率 下限%（例：20）" oninput="render()">

        <select id="sortType" onchange="render()">
          <option value="expected">期待値順</option>
          <option value="rate">成功率順</option>
          <option value="avgProfit">平均利益順</option>
          <option value="visits">訪問回数順</option>
          <option value="route">距離順</option>
        </select>

        <button class="primaryBtn" onclick="showNearbyStores()">🚗 現在地で効率更新</button>

        <button class="primaryBtn" onclick="showNearbyStores()">📍 近くの店舗（3km）</button>
        <button class="ghostBtn" onclick="clearNearbyMode(); render()">通常表示に戻す</button>

        <button class="ghostBtn" onclick="refreshAllCoordinates()">📡 座標なし店舗を一括再取得</button>
        <button class="ghostBtn" onclick="showNoCoordsOnly()">📍 座標なし店舗を見る</button>

        <button class="ghostBtn" onclick="document.getElementById('mapWrap').scrollIntoView({behavior:'smooth'})">🗺️ 店舗MAP</button>
        <button class="ghostBtn" onclick="moveToCurrentLocation()">📍 現在地へ移動</button>
      </div>
    </div>

    <div class="card">
      <div class="layoutButtons">
        <button id="detailLayoutBtn" class="ghostBtn" onclick="setLayoutMode('detail')">詳細</button>
        <button id="compactLayoutBtn" class="ghostBtn" onclick="setLayoutMode('compact')">コンパクト</button>
      </div>
    </div>

    <div class="card">
      <div class="topButtons">
        <button class="primaryBtn" onclick="buildTodayRoute()">🛣 今日ルート作成</button>
        <button class="ghostBtn" onclick="clearTodayChecks()">☑ 今日行くを解除</button>
      </div>
      <div class="helpText">
        店舗カードの「今日行く」にチェックした店舗を使ってルートを作成します。
      </div>
      <div id="todayRouteList" class="helpText" style="margin-top:10px;"></div>
    </div>

    <div id="mapWrap" class="card mapWrap">
      <div class="sectionTitle">店舗MAP</div>
      <div id="map"></div>
    </div>

    <div id="storeList"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./js/app.js?v=ui7"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(console.error);
      });
    }
  </script>
</body>
</html>
