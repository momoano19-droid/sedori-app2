<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店舗管理</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#007aff">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>

  <h1>📱 店舗管理</h1>
  <p class="sub">
    現場で使う画面です。店舗追加・一覧・近くの店舗・地図・今日ルートを操作できます。
  </p>

  <!-- 上部ボタン -->
  <div class="compactPanel">
    <div class="compactGrid">
      <button class="compactBtn primary" onclick="location.href='report.html'">📊 分析画面</button>
      <button class="compactBtn secondary" onclick="render()">再表示</button>
    </div>
  </div>

  <!-- 店舗追加 -->
  <div class="card">
    <div class="sectionTitle">店舗追加</div>

    <input id="storeName" placeholder="店舗名">
    <input id="prefName" placeholder="都道府県">
    <input id="address" placeholder="住所">
    <input id="mapUrl" placeholder="GoogleマップURL">

    <div class="row2">
      <button onclick="addStore()">登録</button>
      <button class="secondary" onclick="openMapSearchFromAddress()">地図検索</button>
    </div>
  </div>

  <!-- フィルター -->
  <div class="card">
    <input id="q" placeholder="検索" oninput="render()">
    <select id="prefFilter" onchange="render()"></select>
  </div>

  <!-- 機能ボタン -->
  <div class="compactPanel">
    <div class="compactGrid">
      <button class="compactBtn primary" onclick="showNearbyStores()">📍近くの店舗</button>
      <button class="compactBtn secondary" onclick="clearNearbyMode(); render()">通常表示</button>

      <button class="compactBtn secondary" onclick="toggleMapPanel()">🗺 MAP</button>
      <button class="compactBtn secondary" onclick="moveMapToCurrentLocation()">📍現在地</button>
    </div>
  </div>

  <!-- 今日ルート -->
  <div class="compactPanel">
    <div class="sectionTitle">今日ルート</div>
    <button class="compactBtn primary" onclick="buildTodayRoute(true)">🗓 作成</button>
  </div>

  <div id="todayPlanArea"></div>

  <!-- 地図 -->
  <div id="mapWrap" class="mapWrap">
    <div id="map"></div>
  </div>

  <!-- 一覧 -->
  <div id="storeList"></div>

  <!-- 個数モーダル -->
  <div id="qtyModal" class="qtyModal">
    <div class="qtyModalCard">
      <div class="qtyModalTitle">個数を選択</div>

      <div class="qtyQuickGrid">
        <button onclick="selectQtyQuick(1)">1</button>
        <button onclick="selectQtyQuick(2)">2</button>
        <button onclick="selectQtyQuick(3)">3</button>
        <button onclick="selectQtyQuick(4)">4</button>
        <button onclick="selectQtyQuick(5)">5</button>
        <button onclick="toggleQtyManual()">手入力</button>
      </div>

      <div id="qtyManualArea">
        <input id="qtyManualInput" type="number">
        <button onclick="confirmQtyManual()">決定</button>
      </div>

      <button onclick="closeQtyModal()">キャンセル</button>
    </div>
  </div>

  <!-- カテゴリモーダル -->
  <div id="categoryModal" class="qtyModal">
    <div class="qtyModalCard">
      <div class="qtyModalTitle">カテゴリ選択</div>

      <div id="categoryList"></div>

      <input id="categoryManualInput" placeholder="新規カテゴリ">
      <button onclick="confirmCategoryManual()">追加</button>

      <button onclick="closeCategoryModal()">キャンセル</button>
    </div>
  </div>

  <!-- JS -->
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>

  <!-- Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./service-worker.js");
    }
  </script>

</body>
</html>
